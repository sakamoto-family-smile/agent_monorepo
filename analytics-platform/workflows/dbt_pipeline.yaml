# Cloud Workflows: analytics-platform dbt pipeline
#
# 定期実行 (Cloud Scheduler) で `analytics-platform-dbt` Cloud Run Job を起動し、
# dbt run + test を BigQuery に対して実行する。GCS の JSONL は external table
# 経由で BigQuery が直接読むため、本 Workflow で Load Job は呼ばない。
#
# 失敗時の挙動:
#   - Cloud Run Job 自体のリトライは job 側 (--max-retries) に任せる。
#   - Workflow レベルでは catch して、設定があれば Slack 通知を送り、
#     Workflow execution を FAILED で終わらせる (Cloud Monitoring で検知可能)。
#
# 引数:
#   project        GCP project id (必須)
#   location       Cloud Run Job の region (default: us-central1)
#   job_name       Cloud Run Job 名 (default: analytics-platform-dbt)
#   slack_webhook  Slack Incoming Webhook URL (任意)
#                  未設定なら通知なし。Secret Manager の値を Scheduler が渡す想定。
#   dbt_command    Cloud Run Job entrypoint のサブコマンド (default: run-and-test)
#
# 戻り値:
#   { status: "succeeded"|"failed", execution: <Cloud Run execution name>, error?: ... }

main:
  params: [args]
  steps:
    - init:
        assign:
          - project: '${default(map.get(args, "project"), sys.get_env("GOOGLE_CLOUD_PROJECT_ID"))}'
          - location: '${default(map.get(args, "location"), "us-central1")}'
          - job_name: '${default(map.get(args, "job_name"), "analytics-platform-dbt")}'
          - slack_webhook: '${default(map.get(args, "slack_webhook"), "")}'
          - dbt_command: '${default(map.get(args, "dbt_command"), "run-and-test")}'

    - log_start:
        call: sys.log
        args:
          severity: INFO
          text: '${"[workflow] starting dbt run project=" + project + " job=" + job_name + " cmd=" + dbt_command}'

    - run_dbt:
        try:
          call: googleapis.run.v2.projects.locations.jobs.run
          args:
            name: '${"projects/" + project + "/locations/" + location + "/jobs/" + job_name}'
            body:
              overrides:
                containerOverrides:
                  - args: ['${dbt_command}']
          result: dbt_execution
        retry:
          # transient API error 用の軽い retry。dbt 自体の失敗 (= Cloud Run Job が non-zero
          # exit) は予測可能な異常なので無闇に retry させず、Cloud Run Job 側の --max-retries に任せる。
          predicate: '${http.default_retry_predicate_non_idempotent}'
          max_retries: 3
          backoff:
            initial_delay: 2
            max_delay: 30
            multiplier: 2
        except:
          as: e
          steps:
            - log_failure:
                call: sys.log
                args:
                  severity: ERROR
                  text: '${"[workflow] dbt run FAILED " + json.encode_to_string(e)}'
            - notify_failure:
                switch:
                  - condition: '${slack_webhook != ""}'
                    call: notify_slack
                    args:
                      webhook: '${slack_webhook}'
                      project: '${project}'
                      job_name: '${job_name}'
                      error: '${e}'
            - return_failure:
                return:
                  status: failed
                  job: '${job_name}'
                  error: '${e}'

    - log_success:
        call: sys.log
        args:
          severity: INFO
          text: '${"[workflow] dbt run succeeded " + dbt_execution.metadata.name}'

    - return_success:
        return:
          status: succeeded
          job: '${job_name}'
          execution: '${dbt_execution.metadata.name}'


# ---------------------------------------------------------------------------
# subworkflow: notify_slack
# ---------------------------------------------------------------------------
notify_slack:
  params: [webhook, project, job_name, error]
  steps:
    - build_payload:
        assign:
          - text: '${"analytics-platform dbt pipeline FAILED — project=" + project + " job=" + job_name}'
          - body:
              text: '${text}'
              attachments:
                - color: danger
                  fields:
                    - title: error
                      value: '${json.encode_to_string(error)}'
                      short: false
    - post:
        try:
          call: http.post
          args:
            url: '${webhook}'
            body: '${body}'
            headers:
              Content-Type: application/json
        except:
          as: e
          steps:
            - log_slack_error:
                call: sys.log
                args:
                  severity: WARNING
                  text: '${"[workflow] slack notify failed (ignored) " + json.encode_to_string(e)}'
