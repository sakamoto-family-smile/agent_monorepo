<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ service_name }}{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; --fg: #1a1a1a; --bg: #fafafa; --border: #d0d0d0; --accent: #0050b3; }
    @media (prefers-color-scheme: dark) {
      :root { --fg: #eaeaea; --bg: #18181a; --border: #3a3a3a; --accent: #79b8ff; }
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; color: var(--fg); background: var(--bg); }
    header { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 24px; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header .user { font-size: 12px; opacity: 0.7; }
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    th { font-weight: 600; opacity: 0.75; }
    .empty { padding: 48px 0; text-align: center; opacity: 0.6; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; background: var(--border); }
  </style>
</head>
<body>
  <header>
    <h1>{{ service_name }}</h1>
    <div class="user">{{ user_email }}</div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
