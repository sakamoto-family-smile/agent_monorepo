# Cloud Build: driving-license-bot line-bot image を build → push する。
#
# Build context は **リポジトリルート**（analytics-platform を path dep として
# 含めるため）。
#
# 起動例（リポジトリルートから）:
#   gcloud builds submit \
#     --config=driving-license-bot/cloudbuild.yaml \
#     --substitutions=_LOCATION=asia-northeast1,_REPO=driving-license-bot,_PROJECT=$GOOGLE_CLOUD_PROJECT \
#     .
#
# substitutions:
#   _LOCATION  Artifact Registry location  (default asia-northeast1)
#   _REPO      Artifact Registry repo name (default driving-license-bot)
#   _IMAGE     image name suffix           (default line-bot)
#   SHORT_SHA  Cloud Build 自動。コミット先頭 7 文字。
#
# 出力:
#   ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${_SHA}
#   ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest

substitutions:
  _LOCATION: asia-northeast1
  _REPO: driving-license-bot
  _IMAGE: line-bot
  # コミット先頭 7 文字。手動 build では Makefile が
  # `--substitutions=_SHA=$(git rev-parse --short=7 HEAD)` で渡す。
  # GitHub Trigger 経由なら built-in の SHORT_SHA を使うこと。
  _SHA: manual

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # 1. ビルド (BuildKit 必須: Dockerfile が --mount=type=cache を使うため)
  - id: build
    name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --file=driving-license-bot/Dockerfile
      - --tag=${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${_SHA}
      - --tag=${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - .

  # 2. smoke test: image が import できるかだけ確認
  #    line-bot (app.main) と batch (scripts.run_batch) 両方の import パスを確認
  #    Cloud Build は cwd=/workspace で起動するため sys.path に /app を明示追加。
  #    (Cloud Run Job 起動時は WORKDIR=/app + `python -m` で問題なし)
  - id: smoke
    name: ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${_SHA}
    entrypoint: python
    args:
      - -c
      - "import sys; sys.path.insert(0, '/app'); import app.main; import scripts.run_batch; print('app + batch imported OK')"

  # 3. push (両タグ)
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${_SHA}

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest

images:
  - ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${_SHA}
  - ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest

timeout: 1200s
