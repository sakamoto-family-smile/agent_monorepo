services:
  app:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      APP_ENV: local
      LOG_LEVEL: info
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    command: >
      uv run uvicorn main:app
      --host 0.0.0.0 --port 8000
      --app-dir /app/app
      --reload
