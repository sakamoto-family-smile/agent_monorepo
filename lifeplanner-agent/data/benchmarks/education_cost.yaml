---
# 教育費ベンチマーク (年額、円)
#
# 出所:
#   - 文部科学省「子供の学習費調査 (令和5年度)」
#   - 日本政策金融公庫「教育費負担の実態調査結果 (令和5年度)」
#
# 値は公立/私立を区別。全国平均、授業料・給食費・学校外活動費を含む。
# 一人暮らし仕送りは含まない(simulator 側で加算)。

# 幼稚園・保育園 (3-5歳、3 年間)
preschool:
  public: 165_000     # 年間、公立
  private: 310_000    # 年間、私立

# 小学校 (6-11歳、6 年間)
elementary:
  public: 352_000
  private: 1_666_000

# 中学校 (12-14歳、3 年間)
junior_high:
  public: 538_000
  private: 1_436_000

# 高校 (15-17歳、3 年間)
high_school:
  public: 512_000
  private: 1_054_000

# 大学 (18-21歳、4 年間)
#   授業料 + 施設設備費 + 入学金按分 (4 年で割る)
university:
  national_public: 820_000   # 国立公立平均
  private_humanities: 1_200_000  # 私立文系
  private_science: 1_550_000     # 私立理系

# 出産一時費用 (正常分娩)
# - 出産育児一時金 50 万は後で差し引く想定
birth_one_time_cost: 550_000

# 児童手当 (2024 年拡充後、所得制限撤廃)
# - 0-3 歳未満: 15,000 / 月
# - 3 歳-高校卒業: 10,000 / 月 (第3子以降は 30,000)
child_allowance_monthly:
  under_3: 15_000
  over_3: 10_000
  third_or_later: 30_000

# 育休給付 (雇用保険)
# - 育休開始から 180 日: 給与の 67%
# - 180 日以降: 給与の 50%
# - 給付期間上限: 子が 1 歳 (保育所入所できない等で最長 2 歳まで延長可)
parental_leave_benefit:
  first_180_days_rate: 0.67
  after_180_days_rate: 0.50
  default_duration_months: 12

# 保育料 (認可、世帯年収別概算。自治体により大きく異なる)
# 月額。市区町村民税所得割額から算出が本来のルールだが、
# 簡略化して給与年収レンジで近似。
childcare_monthly:
  - income_upto: 2_500_000
    fee: 0          # 非課税世帯相当
  - income_upto: 5_000_000
    fee: 25_000
  - income_upto: 8_000_000
    fee: 45_000
  - income_upto: 12_000_000
    fee: 65_000
  - income_upto: null
    fee: 80_000

# 幼保無償化 (2019 年 10 月〜)
# 3-5 歳児クラスは認可保育所・幼稚園とも無料化。対象期間の childcare_monthly を 0 扱い。
preschool_free_from_age: 3
