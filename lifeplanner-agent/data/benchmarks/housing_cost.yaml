---
# 住宅購入関連ベンチマーク (円・年率)
#
# 出所:
#   - 国土交通省「住宅市場動向調査 令和5年度」
#   - 住宅金融支援機構「フラット35 統計」
#   - 国税庁「住宅借入金等特別控除」
#
# 値は全国平均・新築購入を想定。中古は別途パラメータで倍率指定。

# 諸費用 (物件価格に対する比率)
# 登記・仲介手数料・ローン事務手数料・火災保険・不動産取得税 等
closing_cost_ratio: 0.07  # 物件価格の 7% (新築建売)

# 年間維持費 (物件価格ベース)
# 固定資産税・都市計画税 ざっくり 0.7% (評価額ベースなので簡略化して物件価格に近似)
property_tax_rate: 0.007
# 修繕積立金・マンション管理費の年額 (分譲マンション平均)
annual_maintenance_condo: 300_000
# 戸建の修繕費ざっくり年額 (10 年平均)
annual_maintenance_house: 150_000

# 住宅ローン控除 (2024 年改正後、新築・省エネ以外の一般住宅の想定)
#   - 控除期間: 新築 13 年 / 中古 10 年
#   - 年末残高の 0.7% が所得税 + 住民税から控除
#   - 借入限度額 (一般住宅 2000 万、省エネ 3000 万 など)
mortgage_credit:
  new_years: 13
  used_years: 10
  rate: 0.007
  # 最大借入残高(この金額を超える部分は控除対象外)
  max_balance_general: 20_000_000
  max_balance_energy_saving: 30_000_000

# デフォルト金利と期間
default_interest_rate: 0.015  # フラット35 全期間固定 目安
default_term_years: 35
