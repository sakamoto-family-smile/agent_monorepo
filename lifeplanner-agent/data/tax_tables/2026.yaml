---
# 日本税制テーブル 2026 年度版 (簡易版)
#
# スコープ:
#   - 給与所得控除
#   - 所得税(累進)
#   - 住民税(均等割 5,000 + 所得割 10%)
#   - 社会保険料(協会けんぽ全国平均、厚生年金、雇用保険)
#
# データ出所:
#   - 国税庁「No.1410 給与所得控除」
#   - 国税庁「No.2260 所得税の税率」
#   - 総務省「地方税法 均等割・所得割」
#   - 協会けんぽ 2025 年度保険料額表 (2026 もほぼ同水準と仮定)
#   - 日本年金機構 厚生年金保険料額表
#
# 注意:
#   - 所得控除(配偶者・扶養・iDeCo 等)は Phase 4 で拡張。本 YAML では基礎控除のみ。
#   - 自営業/事業所得は未対応(給与所得者前提)
#   - 40 歳以上介護保険料は未対応(Phase 4)

year: 2026

# --- 給与所得控除 ---
# 給与収入 -> 給与所得控除額 (2020 年改正以降の式)
salary_income_deduction:
  brackets:
    - upto: 1_625_000
      deduction: 550_000
    - upto: 1_800_000
      rate: 0.40
      offset: -100_000
    - upto: 3_600_000
      rate: 0.30
      offset: 80_000
    - upto: 6_600_000
      rate: 0.20
      offset: 440_000
    - upto: 8_500_000
      rate: 0.10
      offset: 1_100_000
  cap: 1_950_000  # 給与収入 850 万超は一律

# --- 基礎控除(所得税・住民税で異なる) ---
basic_deduction:
  income_tax: 480_000
  resident_tax: 430_000

# --- 所得税(累進課税) ---
# 課税所得金額に応じた税率・控除額
income_tax:
  brackets:
    - upto: 1_950_000
      rate: 0.05
      deduction: 0
    - upto: 3_300_000
      rate: 0.10
      deduction: 97_500
    - upto: 6_950_000
      rate: 0.20
      deduction: 427_500
    - upto: 9_000_000
      rate: 0.23
      deduction: 636_000
    - upto: 18_000_000
      rate: 0.33
      deduction: 1_536_000
    - upto: 40_000_000
      rate: 0.40
      deduction: 2_796_000
    - upto: null  # 上限なし
      rate: 0.45
      deduction: 4_796_000
  # 復興特別所得税(基準所得税額 x 2.1%)
  reconstruction_surtax_rate: 0.021

# --- 住民税 ---
resident_tax:
  # 所得割(標準税率 10% = 市町村 6% + 都道府県 4%)
  income_rate: 0.10
  # 均等割(市町村 3,500 + 都道府県 1,500 = 5,000)
  # 2024 年度以降は森林環境税 1,000 円が加算され実質 6,000 円
  flat_amount: 6_000
  # 調整控除(人的控除差による、簡易: 2,500 円一律)
  adjustment_deduction: 2_500

# --- 社会保険料(給与所得者・協会けんぽ全国平均) ---
# 標準報酬月額(月収を等級に丸めた額)ベース。ここでは近似的に月収そのものを使用。
social_insurance:
  # 健康保険: 協会けんぽ全国平均 10.00%(労使折半なので本人負担 5.00%)
  health_insurance_rate: 0.0500
  # 厚生年金: 18.300%(労使折半 9.150%)
  pension_rate: 0.0915
  # 雇用保険: 一般事業 本人負担 0.6%
  employment_insurance_rate: 0.006
  # 標準報酬月額の上限(健康保険 139 万、厚生年金 65 万)
  health_monthly_cap: 1_390_000
  pension_monthly_cap: 650_000
