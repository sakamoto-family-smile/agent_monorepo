# Component Inventory - Track all MCP servers, skills, and packages in use
# Update this file when adding/removing components

mcp_servers:
  # kanie-lab-agent
  - name: "google-search-mcp"
    version: "0.1.0"
    source: "local"
    config_path: "kanie-lab-agent/.mcp.json"
    server_key: "google-search"
    tags: ["search", "web", "gemini", "kanie-lab"]

  - name: "@modelcontextprotocol/server-brave-search"
    version: "latest"
    source: "npm"
    config_path: "kanie-lab-agent/.mcp.json"
    server_key: "brave-search"
    tags: ["search", "web", "kanie-lab"]

  - name: "@modelcontextprotocol/server-fetch"
    version: "latest"
    source: "npm"
    config_path: "kanie-lab-agent/.mcp.json"
    server_key: "fetch"
    tags: ["http", "web", "kanie-lab"]

  - name: "@modelcontextprotocol/server-brave-search"
    version: "latest"
    source: "npm"
    config_path: "agent-system-1/.mcp.json"
    server_key: "brave-search"
    tags: ["search", "web"]

  - name: "@modelcontextprotocol/server-filesystem"
    version: "latest"
    source: "npm"
    config_path: "agent-system-1/.mcp.json"
    server_key: "filesystem"
    tags: ["filesystem", "files"]

  - name: "@modelcontextprotocol/server-github"
    version: "latest"
    source: "npm"
    config_path: "agent-system-2/.mcp.json"
    server_key: "github"
    tags: ["github", "code"]

  - name: "@modelcontextprotocol/server-postgres"
    version: "latest"
    source: "npm"
    config_path: "agent-system-2/.mcp.json"
    server_key: "postgres"
    tags: ["database", "sql"]

  # stock-analysis-agent
  - name: "@modelcontextprotocol/server-brave-search"
    version: "latest"
    source: "npm"
    config_path: "stock-analysis-agent/docker-compose.yml"
    server_key: "brave-search"
    tags: ["search", "web", "news", "sentiment", "stock-analysis"]

  # driving-license-bot
  # 全 MCP は internal (project 内で実装) で、security-platform の MCP Proxy 経由で呼ばれる。
  - name: "law-mcp"
    version: "0.1.0"
    source: "local"
    config_path: "driving-license-bot/.mcp.json"
    server_key: "law"
    tags: ["law", "e-gov", "driving-license"]

  - name: "signs-mcp"
    version: "0.1.0"
    source: "local"
    config_path: "driving-license-bot/.mcp.json"
    server_key: "signs"
    tags: ["catalog", "driving-license"]

  - name: "question-bank-mcp"
    version: "0.1.0"
    source: "local"
    config_path: "driving-license-bot/.mcp.json"
    server_key: "question-bank"
    tags: ["vector-search", "driving-license"]

  - name: "firestore-mcp"
    version: "0.1.0"
    source: "local"
    config_path: "driving-license-bot/.mcp.json"
    server_key: "firestore"
    tags: ["state", "driving-license"]

  - name: "bigquery-mcp"
    version: "0.1.0"
    source: "local"
    config_path: "driving-license-bot/.mcp.json"
    server_key: "bigquery"
    tags: ["analytics", "driving-license"]

skills:
  # kanie-lab-agent
  - name: "research-design"
