# Notification configuration
# Set webhook URLs and tokens in .env file

channels:
  slack:
    enabled: false  # Set to true after configuring SLACK_WEBHOOK_URL in .env
    webhook_url: "${SLACK_WEBHOOK_URL}"
    mention_critical: "@channel"
    mention_high: "@here"

  line:
    # LINE Messaging API (Bot) を使う。LINE Notify は 2025/03/31 に終了済。
    # 必要な env: LINE_CHANNEL_SECRET, LINE_CHANNEL_ACCESS_TOKEN, LINE_USER_IDS
    enabled: false
    channel_secret: "${LINE_CHANNEL_SECRET}"
    channel_access_token: "${LINE_CHANNEL_ACCESS_TOKEN}"
    user_ids: "${LINE_USER_IDS}"  # CSV of LINE userId (push 宛先)

  email:
    enabled: false  # Set to true after configuring SMTP settings in .env
    smtp_host: "${SMTP_HOST}"
    smtp_port: 587
    from_address: "${SMTP_USER}"
    to_addresses:
      - "${NOTIFICATION_EMAIL}"

# Thresholds for immediate vs digest notifications
thresholds:
  immediate:
    - severity: CRITICAL
      channels: [slack, line, email]
    - severity: HIGH
      channels: [slack, line]

  daily_digest:
    - severity: MEDIUM
      channels: [slack, email]
    - severity: LOW
      channels: [email]

  weekly_digest:
    - severity: LOW
      channels: [email]

# Digest schedule
digest:
  daily_time: "09:00"   # Daily digest at 9:00 AM
  timezone: "Asia/Tokyo"
