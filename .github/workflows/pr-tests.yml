name: PR Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      security_platform:    ${{ steps.detect.outputs.security_platform }}
      kanie_lab_agent:      ${{ steps.detect.outputs.kanie_lab_agent }}
      stock_analysis_agent: ${{ steps.detect.outputs.stock_analysis_agent }}
      lifeplanner_agent:    ${{ steps.detect.outputs.lifeplanner_agent }}
      hotcook_agent:        ${{ steps.detect.outputs.hotcook_agent }}
      piyolog_analytics:    ${{ steps.detect.outputs.piyolog_analytics }}
      tech_news_agent:      ${{ steps.detect.outputs.tech_news_agent }}
      llm_client:           ${{ steps.detect.outputs.llm_client }}
      analytics_platform:   ${{ steps.detect.outputs.analytics_platform }}
      driving_license_bot:  ${{ steps.detect.outputs.driving_license_bot }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect which modules changed
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -q '^security-platform/'; then
            echo "security_platform=true" >> "$GITHUB_OUTPUT"
          else
            echo "security_platform=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q '^kanie-lab-agent/'; then
            echo "kanie_lab_agent=true" >> "$GITHUB_OUTPUT"
          else
            echo "kanie_lab_agent=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q '^stock-analysis-agent/'; then
            echo "stock_analysis_agent=true" >> "$GITHUB_OUTPUT"
          else
            echo "stock_analysis_agent=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q '^lifeplanner-agent/'; then
            echo "lifeplanner_agent=true" >> "$GITHUB_OUTPUT"
          else
            echo "lifeplanner_agent=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q '^hotcook-agent/'; then
            echo "hotcook_agent=true" >> "$GITHUB_OUTPUT"
          else
            echo "hotcook_agent=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q '^piyolog-analytics/'; then
            echo "piyolog_analytics=true" >> "$GITHUB_OUTPUT"
          else
            echo "piyolog_analytics=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q '^llm-client/'; then
            echo "llm_client=true" >> "$GITHUB_OUTPUT"
          else
            echo "llm_client=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q '^tech-news-agent/'; then
            echo "tech_news_agent=true" >> "$GITHUB_OUTPUT"
          else
            echo "tech_news_agent=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q '^analytics-platform/'; then
            echo "analytics_platform=true" >> "$GITHUB_OUTPUT"
          else
            echo "analytics_platform=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q '^driving-license-bot/'; then
            echo "driving_license_bot=true" >> "$GITHUB_OUTPUT"
          else
            echo "driving_license_bot=false" >> "$GITHUB_OUTPUT"
          fi

  # ── security-platform ──────────────────────────────────────────────────────
  test-security-platform:
    name: Test / security-platform
    needs: detect-changes
    if: needs.detect-changes.outputs.security_platform == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security-platform

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Map changed files to test paths
        id: map
        run: |
          python3 - <<'PYEOF'
          import os, sys

          MODULE_MAP = {
              "security-platform/src/proxy/":     "tests/proxy/",
              "security-platform/src/analyzer/":  "tests/analyzer/",
              "security-platform/src/collector/": "tests/collector/",
              "security-platform/src/db/":        "tests/db/",
              "security-platform/src/notifier/":  "tests/notifier/",
          }
          FULL_SUITE_TRIGGERS = [
              "security-platform/src/config.py",
              "security-platform/pyproject.toml",
              "security-platform/uv.lock",
          ]

          import subprocess
          result = subprocess.run(
              ["git", "diff", "--name-only", f"origin/{os.environ['GITHUB_BASE_REF']}...HEAD"],
              capture_output=True, text=True
          )
          changed = [l.strip() for l in result.stdout.splitlines() if l.strip()]

          for trigger in FULL_SUITE_TRIGGERS:
              if any(f == trigger or f.startswith(trigger) for f in changed):
                  print(f"Full suite triggered by: {trigger}")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                      out.write("test_paths=tests/\n")
                  sys.exit(0)

          test_paths = set()
          for f in changed:
              if f.startswith("security-platform/tests/"):
                  parts = f.split("/")
                  test_paths.add("/".join(parts[1:-1]) + "/")
                  continue
              for src, tgt in MODULE_MAP.items():
                  if f.startswith(src):
                      test_paths.add(tgt)
                      break

          paths = " ".join(sorted(test_paths)) if test_paths else "tests/"
          print(f"Test paths: {paths}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"test_paths={paths}\n")
          PYEOF
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}

      - name: Run tests
        run: |
          uv run pytest ${{ steps.map.outputs.test_paths }} \
            --tb=short -v --no-header

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-security-platform
          path: security-platform/.pytest_cache/
          retention-days: 7

  # ── kanie-lab-agent ────────────────────────────────────────────────────────
  test-kanie-lab-agent:
    name: Test / kanie-lab-agent
    needs: detect-changes
    if: needs.detect-changes.outputs.kanie_lab_agent == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kanie-lab-agent/backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        env:
          FIREBASE_AUTH_EMULATOR_HOST: "localhost:9099"
          FIREBASE_PROJECT_ID: "demo-kanie-lab"
          APP_ENV: "local"
        run: |
          uv run pytest tests/ \
            --tb=short -v --no-header

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-kanie-lab-agent
          path: kanie-lab-agent/backend/.pytest_cache/
          retention-days: 7

  # ── stock-analysis-agent ───────────────────────────────────────────────────
  test-stock-analysis-agent:
    name: Test / stock-analysis-agent
    needs: detect-changes
    if: needs.detect-changes.outputs.stock_analysis_agent == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stock-analysis-agent

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        env:
          APP_ENV: "local"
          ANTHROPIC_API_KEY: "dummy-key-for-tests"
        run: |
          uv run pytest tests/ \
            --tb=short -v --no-header

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-stock-analysis-agent
          path: stock-analysis-agent/.pytest_cache/
          retention-days: 7

  # ── lifeplanner-agent ──────────────────────────────────────────────────────
  test-lifeplanner-agent:
    name: Test / lifeplanner-agent
    needs: detect-changes
    if: needs.detect-changes.outputs.lifeplanner_agent == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lifeplanner-agent

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        env:
          APP_ENV: "local"
          # LLM / LINE とも外部呼出はテスト側でモック化されるためダミーで良い
          LLM_MOCK_MODE: "true"
        run: |
          uv run pytest tests/ \
            --tb=short -v --no-header

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-lifeplanner-agent
          path: lifeplanner-agent/.pytest_cache/
          retention-days: 7

  # ── hotcook-agent ──────────────────────────────────────────────────────────
  test-hotcook-agent:
    name: Test / hotcook-agent
    needs: detect-changes
    if: needs.detect-changes.outputs.hotcook_agent == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hotcook-agent

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        env:
          APP_ENV: "local"
          # Phase 1 は agent モード未使用なので Claude キーは不要
          ANALYTICS_ENABLED: "false"
        run: |
          uv run pytest tests/ \
            --tb=short -v --no-header

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-hotcook-agent
          path: hotcook-agent/.pytest_cache/
          retention-days: 7

  # ── piyolog-analytics ──────────────────────────────────────────────────────
  test-piyolog-analytics:
    name: Test / piyolog-analytics
    needs: detect-changes
    if: needs.detect-changes.outputs.piyolog_analytics == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: piyolog-analytics

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        env:
          APP_ENV: "local"
          ANALYTICS_ENABLED: "false"
          LINE_CHANNEL_SECRET: ""
          LINE_CHANNEL_ACCESS_TOKEN: ""
          FAMILY_USER_IDS: "Utest1,Utest2"
        run: |
          uv run pytest tests/ \
            --tb=short -v --no-header

      - name: Run ruff
        run: uv run ruff check app tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-piyolog-analytics
          path: piyolog-analytics/.pytest_cache/
          retention-days: 7

  # ── tech-news-agent ────────────────────────────────────────────────────────
  test-tech-news-agent:
    name: Test / tech-news-agent
    needs: detect-changes
    if: needs.detect-changes.outputs.tech_news_agent == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tech-news-agent

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        env:
          APP_ENV: "local"
          ANALYTICS_ENABLED: "false"
          LLM_MOCK_MODE: "true"
          LINE_CHANNEL_SECRET: ""
          LINE_CHANNEL_ACCESS_TOKEN: ""
          LINE_USER_IDS: ""
        run: |
          uv run pytest tests/ \
            --tb=short -v --no-header

      - name: Run ruff
        run: uv run ruff check app tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-tech-news-agent
          path: tech-news-agent/.pytest_cache/
          retention-days: 7

  # ── llm-client ─────────────────────────────────────────────────────────────
  test-llm-client:
    name: Test / llm-client
    needs: detect-changes
    if: needs.detect-changes.outputs.llm_client == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: llm-client

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest tests/ --tb=short -v --no-header

      - name: Run ruff
        run: uv run ruff check llm_client tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-llm-client
          path: llm-client/.pytest_cache/
          retention-days: 7

  # ── analytics-platform ─────────────────────────────────────────────────────
  test-analytics-platform:
    name: Test / analytics-platform
    needs: detect-changes
    if: needs.detect-changes.outputs.analytics_platform == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics-platform

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run pytest
        env:
          ENV: "local"
        run: |
          uv run pytest tests/ --tb=short -v --no-header

      - name: Smoke-test demo + dbt
        env:
          ENV: "local"
        run: |
          uv run python scripts/demo_emit.py --count 5
          cd dbt && uv run dbt run --profiles-dir . --project-dir .
          uv run dbt test --profiles-dir . --project-dir .

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-analytics-platform
          path: |
            analytics-platform/.pytest_cache/
            analytics-platform/dbt/target/
          retention-days: 7

  # ── driving-license-bot ───────────────────────────────────────────────────
  test-driving-license-bot:
    name: Test / driving-license-bot
    needs: detect-changes
    if: needs.detect-changes.outputs.driving_license_bot == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: driving-license-bot

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff
        run: uv run ruff check app tests

      - name: Run tests
        env:
          ENV: "local"
          # LINE / GCP とも外部呼出はテスト側でモック化されるため空でよい。
          # Webhook テストは monkeypatch で LINE_CHANNEL_SECRET を上書きする。
          LINE_CHANNEL_SECRET: ""
          LINE_CHANNEL_ACCESS_TOKEN: ""
          LINE_CHANNEL_ID: ""
        run: |
          uv run pytest tests/ \
            --tb=short -v --no-header

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-driving-license-bot
          path: driving-license-bot/.pytest_cache/
          retention-days: 7

  # ── driving-license-bot Terraform validate / fmt（GCP 認証なし） ────────────
  terraform-driving-license-bot:
    name: Terraform / driving-license-bot
    needs: detect-changes
    if: needs.detect-changes.outputs.driving_license_bot == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: driving-license-bot/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive -diff

      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate -no-color

  # ── driving-license-bot Terraform plan（WIF 認証） ────────────────────────
  # 必須 GitHub repo Variables（Settings > Secrets and variables > Actions > Variables）:
  #   WIF_PROVIDER    Workload Identity Provider のフル resource name
  #                   例: projects/123/locations/global/workloadIdentityPools/github-actions-pool/providers/github
  #   TF_PLAN_SA      plan 用 SA email
  #                   例: sa-terraform-plan@sakamoto-family-agent.iam.gserviceaccount.com
  #   TFSTATE_BUCKET  tfstate を持つ GCS バケット名
  #                   例: sakamoto-family-agent-driving-license-bot-tfstate
  #   GCP_PROJECT_ID  対象 project id
  #
  # vars が未設定 / 空ならジョブごとスキップ（PR は通る）。
  # WIF / SA は terraform/wif.tf を `enable_wif=true` で apply して作る。
  # 値は `terraform output wif_setup_summary` で取得可能。
  terraform-plan-driving-license-bot:
    name: Terraform plan / driving-license-bot
    needs: [detect-changes, terraform-driving-license-bot]
    if: |
      needs.detect-changes.outputs.driving_license_bot == 'true' &&
      vars.WIF_PROVIDER != '' &&
      vars.TF_PLAN_SA != '' &&
      vars.TFSTATE_BUCKET != '' &&
      vars.GCP_PROJECT_ID != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # WIF で OIDC token 発行
      pull-requests: write  # plan 結果を PR コメント
    defaults:
      run:
        working-directory: driving-license-bot/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_PLAN_SA }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Generate backend.tf
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ vars.TFSTATE_BUCKET }}"
              prefix = "terraform/state"
            }
          }
          EOF

      - name: Terraform init
        # -lock=false で state lock を取らない (read-only SA で write 不要)。
        # 並列 PR 実行時の plan 競合は許容（state は plan で書き換わらない）。
        run: terraform init -input=false -lock=false

      - name: Terraform plan
        id: plan
        continue-on-error: true
        run: |
          # tfvars は repo に commit していない（個人値）ので、本番環境と整合する
          # 値を CI 側で全部明示する。GitHub Variables に WIF_PROVIDER を登録できて
          # いる時点で WIF は有効化されているので enable_wif=true を渡す。
          # -lock=false: read-only SA で state lock オブジェクト書き込み不可。
          set +e
          terraform plan \
            -no-color -input=false -lock=false \
            -var "project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var "enable_wif=true" \
            -var "tfstate_bucket=${{ vars.TFSTATE_BUCKET }}" \
            -var "github_repo=${{ github.repository }}" \
            2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = '';
            try { plan = fs.readFileSync('driving-license-bot/terraform/plan.txt', 'utf8'); } catch {}
            const MAX = 60000;  // GitHub コメントの上限を考慮
            if (plan.length > MAX) {
              plan = plan.slice(0, MAX) + '\n\n... (truncated) ...';
            }
            const body = [
              '### Terraform plan / driving-license-bot',
              '',
              '<details><summary>plan output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '</details>'
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Fail job if plan errored
        if: steps.plan.outputs.exit_code != '0' && steps.plan.outputs.exit_code != '2'
        run: |
          echo "terraform plan exit code: ${{ steps.plan.outputs.exit_code }}"
          # exit 0 = no changes / exit 2 = changes (with -detailed-exitcode); ここでは out=tfplan.out
          # を渡しているので exit 0 が成功、その他は失敗扱い。
          exit 1
