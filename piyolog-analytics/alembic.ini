# piyolog-analytics Alembic 設定。
#
# 起動: `make migrate` または `uv run alembic upgrade head`
# DB URL は env (`DATABASE_URL` / `PIYOLOG_DB_PATH`) から alembic/env.py で解決する。

[alembic]
script_location = alembic
prepend_sys_path = .:app
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
