# Cloud Build pipeline for piyolog-analytics Cloud Run service.
#
# 使い方 (リポジトリルートから):
#   gcloud builds submit \
#     --config piyolog-analytics/cloudbuild.yaml \
#     --substitutions=_LOCATION=us-central1,_REPO=piyolog-analytics \
#     .
#
# 必要な substitutions:
#   _LOCATION  Artifact Registry の region (例: us-central1, asia-northeast1)
#   _REPO      Artifact Registry リポジトリ名 (要事前作成)
#   _IMAGE     image 名 (default: piyolog-analytics)
#
# 出力 image:
#   ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}
#   ${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest

substitutions:
  _LOCATION: us-central1
  _REPO: piyolog-analytics
  _IMAGE: piyolog-analytics

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"
  - "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest"

steps:
  # 1. BuildKit でマルチステージ build (キャッシュ活用)
  #    context = リポジトリルート (path dep `../analytics-platform` を解決するため)
  - id: build
    name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - "--tag=${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"
      - "--tag=${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest"
      - "--cache-from=${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest"
      - "--build-arg=BUILDKIT_INLINE_CACHE=1"
      - "--file=piyolog-analytics/Dockerfile"
      - "."

  # 2. image 内で alembic offline mode を試す (smoke check)
  - id: smoke-alembic-offline
    name: "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"
    entrypoint: sh
    env:
      - "DATABASE_URL=sqlite+aiosqlite:////tmp/smoke.db"
    args:
      - -c
      - "cd /app && alembic upgrade head"

# build に失敗したら fail-fast。タイムアウトは 20 分。
timeout: 1200s
